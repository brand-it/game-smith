name: Build & Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  package-deb:
    name: Build .deb & AppImage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libappindicator3-dev \
            libxdo-dev \
            xdotool \
            dpkg-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: swatinem/rust-cache@v2

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --quiet

      - name: Build & package
        run: make package

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-smith-deb
          path: target/release/*.deb
          retention-days: 30

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-smith-appimage
          path: target/release/*.AppImage
          retention-days: 30

  package-rpm:
    name: Build RPM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libappindicator3-dev \
            libxdo-dev \
            podman

      - name: Build & package RPM
        run: make package-rpm

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-smith-rpm
          path: target/release/x86_64/*.rpm
          retention-days: 30

  package-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: swatinem/rust-cache@v2

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Build release
        run: cargo build --release --bin game-smith

      - name: Build MSI installer
        run: cargo wix --package game-smith

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-smith-msi
          path: target/wix/*.msi
          retention-days: 30
