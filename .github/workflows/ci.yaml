name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  RUST_TOOLCHAIN: "1.95.0"
  CARGO_INCREMENTAL: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  format:
    name: Check Style
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Run Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - name: Cache cargo target
        uses: actions/cache@v6
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ github.job }}-
      - name: Cache apt packages
        uses: actions/cache@v6
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/ci.yaml') }}
          restore-keys: |
            ${{ runner.os }}-apt-
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libappindicator3-dev libxdo-dev xdotool
      - run: cargo clippy --all-features -- -D warnings

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - name: Cache cargo target
        uses: actions/cache@v6
        with:
          path: target/
          key: ${{ runner.os }}-cargo-target-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-${{ github.job }}-
      - name: Cache apt packages
        uses: actions/cache@v6
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/ci.yaml') }}
          restore-keys: |
            ${{ runner.os }}-apt-
      - run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libappindicator3-dev libxdo-dev xdotool xvfb
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - name: Run tests
        run: xvfb-run cargo nextest run --retries 3

  version-check:
    name: Check Version Sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Check VERSION matches Cargo.toml
        run: |
          # Canonical version from Cargo.toml [package] section
          version_cargo=$(grep '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')

          failed=0

          # VERSION file
          version_file=$(cat VERSION)
          if [ "$version_file" != "$version_cargo" ]; then
            echo "::error::VERSION ($version_file) does not match Cargo.toml ($version_cargo)"
            failed=1
          fi

          # Error page sidebar footer
          version_error=$(grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' src/controllers/error.rs || true)
          if [ "$version_error" != "$version_cargo" ]; then
            echo "::error::src/controllers/error.rs ($version_error) does not match Cargo.toml ($version_cargo)"
            failed=1
          fi

          # Base template default
          version_template=$(grep -oP 'default\(value="\K[0-9]+\.[0-9]+\.[0-9]+' assets/views/_layout/base.html || true)
          if [ "$version_template" != "$version_cargo" ]; then
            echo "::error::assets/views/_layout/base.html ($version_template) does not match Cargo.toml ($version_cargo)"
            failed=1
          fi

          exit $failed
