name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  format:
    name: Check Style
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Run Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libappindicator3-dev libxdo-dev xdotool
      - run: cargo clippy --all-features -- -D warnings

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: swatinem/rust-cache@v2
      - run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libappindicator3-dev libxdo-dev xdotool
      - run: cargo test --all-features --all