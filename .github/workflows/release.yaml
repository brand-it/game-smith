name: Release

on:
  push:
    branches: [main]
    paths: [VERSION]

env:
  RUST_TOOLCHAIN: "1.95.0"
  CARGO_INCREMENTAL: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Cache cargo registry
        if: "!startsWith(matrix.os, 'windows')"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-
      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ matrix.os }}-cargo-target-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-target-release-

      # Linux: .deb + .AppImage via cargo-packager
      - name: Install Linux deps
        if: matrix.name == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libappindicator3-dev libxdo-dev xdotool dpkg-dev
      - name: Install cargo-packager
        if: matrix.name == 'linux'
        run: cargo install cargo-packager --locked --quiet
      - name: Build packages
        if: matrix.name == 'linux'
        run: make package
      - name: Upload Linux artifacts
        if: matrix.name == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: assets-${{ matrix.name }}
          path: |
            target/release/*.deb
            target/release/*.AppImage
          retention-days: 1

      # Windows: .msi via cargo-wix
      - name: Install cargo-wix
        if: matrix.name == 'windows'
        run: cargo install cargo-wix --locked --quiet
      - name: Build release
        if: matrix.name == 'windows'
        run: cargo build --release --bin game-smith
      - name: Build MSI
        if: matrix.name == 'windows'
        run: cargo wix --package game-smith
      - name: Upload Windows artifacts
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: assets-${{ matrix.name }}
          path: target/wix/
          retention-days: 1

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Validate version matches Cargo.toml
        run: |
          version_file=$(cat VERSION)
          version_cargo=$(grep '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$version_file" != "$version_cargo" ]; then
            echo "::error::VERSION ($version_file) does not match Cargo.toml ($version_cargo)"
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: assets-*
          path: dist/
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/*.msi
