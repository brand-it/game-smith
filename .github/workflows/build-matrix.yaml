name: Cross-Platform Build

on:
  pull_request:
    branches: [main, master]

env:
  RUST_TOOLCHAIN: "1.95.0"

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pkg-manager: apt-get
            install-cmd: "sudo apt-get update && sudo apt-get install -y libgtk-3-dev libappindicator3-dev libxdo-dev xdotool xvfb"
            test-cmd: xvfb-run cargo test --all-features --all
            artifact-name: game-smith-ubuntu
          - os: windows-latest
            pkg-manager: ""
            install-cmd: ""
            test-cmd: cargo test --all-features --all
            artifact-name: game-smith-windows
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: swatinem/rust-cache@v2

      - name: Install system dependencies
        if: matrix.install-cmd != ''
        run: ${{ matrix.install-cmd }}

      - name: Build release
        run: cargo build --release

      - name: Run tests
        run: ${{ matrix.test-cmd }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: target/release/game-smith${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          retention-days: 7
