name: Cross-Platform Build

on:
  pull_request:
    branches: [main, master]

env:
  RUST_TOOLCHAIN: "1.95.0"
  CARGO_INCREMENTAL: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            install-cmd: "sudo apt-get update && sudo apt-get install -y libgtk-3-dev libappindicator3-dev libxdo-dev xdotool xvfb"
            test-cmd: xvfb-run cargo nextest run --retries 3
            artifact-name: game-smith-ubuntu
          - os: windows-latest
            install-cmd: ""
            test-cmd: cargo nextest run --retries 3
            artifact-name: game-smith-windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo registry
        if: "!startsWith(matrix.os, 'windows')"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ matrix.os }}-cargo-target-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-target-${{ github.job }}-

      - name: Install system dependencies
        if: matrix.install-cmd != ''
        run: ${{ matrix.install-cmd }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest

      - name: Run tests
        run: ${{ matrix.test-cmd }}

      - name: Build release
        if: success()
        run: cargo build --release

      - name: Upload binary artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: target/release/game-smith${{ startsWith(matrix.os, 'windows') && '.exe' || '' }}
          retention-days: 7
