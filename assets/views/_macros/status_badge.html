{% macro status_badge(status) %}
{% if status == "running" %}
<span class="inline-flex items-center rounded-full bg-blue-100 px-2.5 py-0.5 text-xs font-semibold text-blue-800">
    <span class="mr-1.5 h-1.5 w-1.5 rounded-full bg-blue-500 animate-pulse"></span>
    {{ status }}
</span>
{% elif status == "finished" %}
<span class="inline-flex items-center rounded-full bg-green-100 px-2.5 py-0.5 text-xs font-semibold text-green-800">{{ status }}</span>
{% elif status == "failed" %}
<span class="inline-flex items-center rounded-full bg-red-100 px-2.5 py-0.5 text-xs font-semibold text-red-800">{{ status }}</span>
{% elif status == "stopped" %}
<span class="inline-flex items-center rounded-full bg-yellow-100 px-2.5 py-0.5 text-xs font-semibold text-yellow-800">{{ status }}</span>
{% else %}
<span class="inline-flex items-center rounded-full bg-gray-100 px-2.5 py-0.5 text-xs font-semibold text-gray-800">{{ status }}</span>
{% endif %}
{% endmacro %}
